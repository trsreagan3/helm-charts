name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Disabled until v1.0.0 of kbounce lands (#235) + the chart version
    # is bumped past 0.1.0. Flip to `true` then.
    if: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
