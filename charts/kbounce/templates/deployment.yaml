apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kbounce.fullname" . }}
  labels:
    {{- include "kbounce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kbounce.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kbounce.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kbounce.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kbounce
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --mode={{ .Values.proxy.mode }}
            - --host={{ .Values.proxy.host }}
            - --port={{ .Values.proxy.port }}
            - --default-policy={{ .Values.proxy.defaultPolicy }}
            - --profile={{ .Values.profiles.active }}
            - --upstream={{ .Values.upstream.apiserver }}
            {{- /*
              SQLite store lives in /tmp (an emptyDir) because the pod
              runs with readOnlyRootFilesystem: true. The kbounce
              default of ~/.kbouncer/state.db would error with
              "read-only file system" on first start. Also use /tmp for
              profiles.yaml the binary writes on first start.
            */}}
            - --db=/tmp/kbouncer/state.db
            - --profiles-path={{ if .Values.profiles.additionalProfiles }}/etc/kbounce/profiles.yaml{{ else }}/tmp/kbouncer/profiles.yaml{{ end }}
            {{- /*
              The kbounce binary refuses to bind to anything other than
              127.0.0.1 / ::1 / localhost without an explicit operator
              acknowledgement. In a Pod context the listener must accept
              traffic from the Service's ClusterIP, so the chart's default
              `proxy.host` is 0.0.0.0 — which requires the ack flag below.
              When an operator overrides proxy.host to a loopback value
              for a sidecar-style deployment, the flag is omitted.
            */}}
            {{- $bindHost := .Values.proxy.host -}}
            {{- if not (or (eq $bindHost "127.0.0.1") (eq $bindHost "::1") (eq $bindHost "localhost")) }}
            - --i-know-this-binds-externally
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/kbounce/tls/listener-tls-cert
            - --tls-key=/etc/kbounce/tls/listener-tls-key
            {{- if .Values.tls.clientAuth }}
            - --require-client-cert=/etc/kbounce/tls/listener-tls-client-ca
            {{- end }}
            {{- end }}
            {{- /*
              GET /audit/events sits on the wire port. The binary
              REQUIRES --audit-events-token when bound non-loopback so
              the endpoint isn't an unauthenticated leak. We pass it via
              $(VAR) expansion from a Secret-backed env var so the
              token never appears in the rendered Deployment manifest;
              process listing inside the container still sees the value
              after expansion (unavoidable without a binary-side env-var
              fallback — tracked at iam-jit §A33 follow-up).
            */}}
            {{- if not (or (eq .Values.proxy.host "127.0.0.1") (eq .Values.proxy.host "::1") (eq .Values.proxy.host "localhost")) }}
            - --audit-events-token=$(KBOUNCE_AUDIT_EVENTS_TOKEN)
            {{- end }}
          env:
            {{- if not .Values.versionCheck.enabled }}
            - name: KBOUNCE_NO_VERSION_CHECK
              value: "1"
            {{- end }}
            {{- if not (or (eq .Values.proxy.host "127.0.0.1") (eq .Values.proxy.host "::1") (eq .Values.proxy.host "localhost")) }}
            - name: KBOUNCE_AUDIT_EVENTS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-audit-events" (include "kbounce.fullname" .)) .Values.audit.events.existingSecret }}
                  key: token
            {{- end }}
          ports:
            - name: wire
              containerPort: {{ .Values.proxy.port }}
              protocol: TCP
          {{- /*
            Health endpoints live on the SAME port as the wire proxy
            (`/healthz` is registered on the single mux at
            internal/proxy/proxy.go). There is no separate management
            listener in the kbounce binary, so liveness + readiness
            both probe the wire port.
          */}}
          livenessProbe:
            httpGet:
              path: /healthz
              port: wire
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: wire
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.profiles.additionalProfiles }}
            - name: profiles
              mountPath: /etc/kbounce/profiles.yaml
              subPath: profiles.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/kbounce/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.profiles.additionalProfiles }}
        - name: profiles
          configMap:
            name: {{ include "kbounce.fullname" . }}-profiles
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName | required "tls.secretName is required when tls.enabled is true" }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
