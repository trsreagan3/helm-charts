{{- /*
  Audit-events bearer-token Secret.

  Created only when the operator did NOT point at an existing Secret
  via audit.events.existingSecret. The token value comes from
  audit.events.token if set; otherwise a random 32-byte hex string is
  generated at install time. The generated token is annotated with
  helm.sh/resource-policy: keep so a `helm uninstall` does not delete
  it — without that the token would rotate silently on every upgrade
  and break any external collector configured against the value.
*/}}
{{- if not .Values.audit.events.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kbounce.fullname" . }}-audit-events
  labels:
    {{- include "kbounce.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  token: {{ default (randAlphaNum 48) .Values.audit.events.token | b64enc | quote }}
{{- end }}
