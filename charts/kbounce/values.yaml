# Default values for kbounce.
# This is a YAML-formatted file. Values map 1:1 to kbounce CLI flags
# where possible; see https://github.com/trsreagan3/kbouncer for docs.

# -- Number of kbounce pod replicas. kbounce is stateless in cooperative
# mode (audit goes to stdout / SQLite emptyDir); run >1 only behind a
# shared L4 LB if you need HA.
replicaCount: 1

image:
  repository: ghcr.io/trsreagan3/kbounce
  # -- Image tag. `main` tracks the latest published build; pin to a
  # released tag (e.g. `v1.0.0`) for production.
  tag: main
  pullPolicy: IfNotPresent

# -- Image pull secrets when ghcr.io image is private.
imagePullSecrets: []

# Proxy listener config: this is the port your agents / kubectl point at.
proxy:
  # -- Operating mode: `cooperative` (default — agents pass auth headers
  # through, kbounce gates + audits) or `transparent` (kbounce is fully
  # in-path, terminates client TLS, re-encrypts upstream). Default per
  # bounce-default-profile-pattern.
  mode: cooperative
  # -- Listen address inside the pod. ClusterIP service exposes this on
  # the pod network.
  host: "0.0.0.0"
  port: 8443
  # -- Fail-closed default when no profile matches a request.
  defaultPolicy: deny

# Profile configuration. Profiles define what the active session is
# allowed to do (verb/resource/namespace gates + denylist).
profiles:
  # -- Active profile name. Default `full-user` per
  # bounce-default-profile-pattern (lean-permissive, audits all,
  # blocks only universally-dangerous ops).
  active: full-user
  # -- Additional user-defined profiles. When non-empty, rendered into
  # a ConfigMap mounted at /etc/kbounce/profiles.yaml and passed via
  # --profiles-path. Each entry must be a valid kbounce profile object.
  # See examples/ for sample profile shapes.
  additionalProfiles: []

# Upstream Kubernetes API target. In-cluster default works for the
# common case (kbounce gates requests to the same cluster it runs in).
upstream:
  apiserver: https://kubernetes.default.svc
  # -- CA bundle override for upstream TLS verification. Leave empty
  # to use the in-cluster default at
  # /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  caBundle: ""

# Management listener: separate port for /healthz, /metrics, /audit.
# Keep on 127.0.0.1 unless you explicitly want it network-reachable.
mgmt:
  host: "127.0.0.1"
  port: 8444
  healthzPath: /healthz

# TLS material for the proxy listener. When enabled, you must create a
# Secret with keys `listener-tls-cert`, `listener-tls-key`, and
# optionally `listener-tls-client-ca` (for mTLS), then set
# tls.secretName to its name.
tls:
  enabled: false
  secretName: ""
  # -- Require client certs (mTLS). Requires `listener-tls-client-ca`
  # key in the Secret.
  clientAuth: false

# Opt-in version check. Default OFF per opt-in-feedback-pipeline:
# kbounce phones home to GitHub for latest-version comparison only when
# explicitly enabled. When disabled, sets KBOUNCE_NO_VERSION_CHECK=1.
versionCheck:
  enabled: false

# Pod resource requests/limits. Small defaults — kbounce is a thin
# proxy; bump if you see CPU throttling under load.
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  # -- Create a ServiceAccount for the kbounce pod.
  create: true
  # -- Override the SA name. Leave empty to use the chart fullname.
  name: ""
  annotations: {}

rbac:
  # -- Create Role/RoleBinding for the SA. kbounce does NOT need k8s
  # RBAC by default — it proxies inbound requests and preserves the
  # caller's auth end-to-end. Enable only if you've added kbounce
  # features that talk to the k8s API directly.
  enabled: false

service:
  type: ClusterIP
  # Wire and mgmt ports are exposed by name; override only if you need
  # specific NodePort numbers or LoadBalancer behaviour.
  annotations: {}

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level + container-level security context. Defaults to non-root
# distroless UID 65532 with read-only root filesystem. SQLite scratch
# space lives on an emptyDir mount at /tmp.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
